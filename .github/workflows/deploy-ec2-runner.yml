name: Deploy to EC2 (Self-Hosted Runner)

on:
  workflow_run:
    workflows: ["Build and Push to Docker Hub"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Allows manual triggering


jobs:
  deploy:
    runs-on: self-hosted 
    environment: production # This runs on your EC2 instance
    
    # Only deploy if the Docker build workflow succeeded, or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Prerequisites
        run: |
          echo "🔍 Verifying prerequisites..."
          
          # Check Docker is installed and accessible
          if ! command -v docker &> /dev/null; then
            echo "❌ Docker is not installed or not in PATH"
            exit 1
          fi
          echo "✅ Docker found: $(docker --version)"
          
          # Check Docker Compose is installed
          if ! command -v docker compose &> /dev/null; then
            echo "❌ Docker Compose is not installed or not in PATH"
            exit 1
          fi
          echo "✅ Docker Compose found: $(docker compose version)"
          
          # Check if user can run docker without sudo
          if ! docker ps &> /dev/null; then
            echo "⚠️  Warning: Cannot run docker commands. User may need to be in docker group."
            echo "Run: sudo usermod -aG docker $USER && sudo systemctl restart actions.runner.*"
          else
            echo "✅ Docker permissions OK"
          fi

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "⚠️  Docker Hub credentials not provided. Attempting to pull public image..."
            echo "If the repository is private, add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to GitHub Secrets"
          else
            echo "🔐 Logging in to Docker Hub..."
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            echo "✅ Docker Hub login successful"
          fi

      - name: Deploy Application
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
        run: |
          set -e
          echo "🚀 Starting deployment..."
          
          # Navigate to deployment directory
          if [ ! -d ~/drf-deployment ]; then
            echo "❌ Deployment directory not found at ~/drf-deployment"
            echo "Please create it and add docker-compose.prod.yml, nginx.conf, and .env files"
            exit 1
          fi
          cd ~/drf-deployment
          
          # Verify required files exist
          if [ ! -f docker-compose.prod.yml ]; then
            echo "❌ docker-compose.prod.yml not found in ~/drf-deployment"
            exit 1
          fi
          if [ ! -f nginx.conf ]; then
            echo "❌ nginx.conf not found in ~/drf-deployment"
            exit 1
          fi
          if [ ! -f .env ]; then
            echo "❌ .env file not found in ~/drf-deployment"
            echo "Please create .env file with all required environment variables"
            exit 1
          fi
          echo "✅ All required files found"
          
          # Verify DOCKERHUB_REPOSITORY is set
          if [ -z "${DOCKERHUB_REPOSITORY}" ]; then
            echo "❌ DOCKERHUB_REPOSITORY environment variable is not set"
            echo "Please set it in GitHub Secrets"
            exit 1
          fi
          
          # Display repository name for debugging
          echo "📋 Repository: ${DOCKERHUB_REPOSITORY}"
          echo "📋 Full image name: ${DOCKERHUB_REPOSITORY}:latest"
          
          # Pull latest Docker image
          echo "📥 Pulling latest Docker image: ${DOCKERHUB_REPOSITORY}:latest"
          if docker pull ${DOCKERHUB_REPOSITORY}:latest; then
            echo "✅ Image pulled successfully"
          else
            echo "❌ Failed to pull image: ${DOCKERHUB_REPOSITORY}:latest"
            echo ""
            echo "Possible issues:"
            echo "1. Repository name is incorrect: ${DOCKERHUB_REPOSITORY}"
            echo "2. Image doesn't exist yet (check if Docker Hub push workflow completed)"
            echo "3. Repository is private and requires authentication (add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets)"
            echo "4. Network connectivity issues"
            echo ""
            echo "Verify the repository exists at: https://hub.docker.com/r/${DOCKERHUB_REPOSITORY}"
            exit 1
          fi
          
          # Stop existing containers
          echo "🛑 Stopping existing containers..."
          docker compose -f docker-compose.prod.yml down || true
          
          # Start new containers (Docker Compose automatically loads .env from current directory)
          echo "▶️  Starting new containers..."
          echo "📋 Using .env file from current directory"
          docker compose -f docker-compose.prod.yml --env-file .env up -d || { 
            echo "❌ Failed to start containers"
            echo "📋 Checking logs for errors:"
            docker compose -f docker-compose.prod.yml logs --tail=20 || true
            exit 1
          }
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to be healthy..."
          sleep 10
          
          # Check container status
          echo "📊 Container status:"
          docker compose -f docker-compose.prod.yml ps
          
          # Health check: GET / returns 404 (no root URL); use /health/ and Host from ALLOWED_HOSTS
          echo "🏥 Performing health check..."
          if ! command -v curl &> /dev/null; then
            echo "⚠️  curl not found, skipping health check"
            echo "Install curl with: sudo apt install curl (Ubuntu) or sudo yum install curl (Amazon Linux)"
          else
            RAW_ALLOWED=$(grep -E '^ALLOWED_HOSTS=' .env 2>/dev/null | head -1 | sed 's/^ALLOWED_HOSTS=//' | tr -d '\r' | sed 's/^"\(.*\)"$/\1/' | sed "s/^'\(.*\)'$/\1/" || true)
            if echo "$RAW_ALLOWED" | grep -qE '(^|[,[:space:]])\*([,[:space:]]|$)'; then
              HEALTH_HOST="localhost"
            elif [ -n "$RAW_ALLOWED" ]; then
              HEALTH_HOST=$(echo "$RAW_ALLOWED" | cut -d',' -f1 | tr -d ' ')
            else
              HEALTH_HOST="localhost"
            fi
            echo "📋 GET http://127.0.0.1/health/ with Host: ${HEALTH_HOST}"
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if curl -fsS -o /dev/null -H "Host: ${HEALTH_HOST}" "http://127.0.0.1/health/"; then
                echo "✅ Application is healthy!"
                break
              fi
              attempt=$((attempt + 1))
              echo "⏳ Waiting for application... (attempt $attempt/$max_attempts)"
              sleep 2
            done
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Health check failed after $max_attempts attempts"
              echo "Expected: HTTP 200 from /health/ (GET / has no URL and returns 404)."
              echo "📋 Container status:"
              docker compose -f docker-compose.prod.yml ps
              echo "📋 Recent logs:"
              docker compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            fi
          fi
          
          # Clean up old images
          echo "🧹 Cleaning up old Docker images..."
          docker image prune -f || true
          
          echo "✅ Deployment completed successfully!"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** ${{ secrets.DOCKERHUB_REPOSITORY }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** Self-hosted on EC2" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi
